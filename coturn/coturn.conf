# /etc/coturn/turnserver.conf for Pingo

# Listening port
listening-port=3478

# Use finger prints
fingerprint

# Use long-term credential mechanism
lt-cred-mech

# REST API for time-limited credentials
use-auth-secret
static-auth-secret=pingo-relay-secret-2026

# Realm (usually your domain)
realm=pingo.relay

# Log file
log-file=stdout

# Verbose logging
verbose

# External IP (Crucial if behind another NAT)
# external-ip=YOUR_PUBLIC_IP

# Min/Max ports for relay
min-port=49152
max-port=65535
